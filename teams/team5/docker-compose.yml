services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Inside the container the volume mount is /app/data, but paths.py
      # computes REPO_ROOT=/ from /app/..., so the default resolve_repo_path
      # lands at /data (wrong). Override storage paths explicitly.
      - CHROMADB_PATH=/app/data/chromadb
      - FEEDBACK_DB_PATH=/app/data/feedback.db
      - KANKER_NL_JSON_PATH=/app/data/kanker_nl_pages_all.json
      - PUBLICATIONS_DIR=/app/data/reports
      - SCIENTIFIC_PUBLICATIONS_DIR=/app/data/scientific_publications
      - SITEMAP_PATH=/app/data/sitemap.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
